name: PHPUnit Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, mbstring, hash, json, openssl, apcu
          ini-values: apc.enable_cli=1, display_errors=On, error_reporting=-1
          coverage: xdebug
          tools: composer:v2

      - name: Validate composer.json
        working-directory: TEST
        run: composer validate --no-check-all

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: TEST/vendor
          key: php-${{ matrix.php }}-composer-${{ hashFiles('TEST/composer.lock') }}
          restore-keys: |
            php-${{ matrix.php }}-composer-

      - name: Install dependencies
        working-directory: TEST
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPStan analysis
        working-directory: TEST
        run: vendor/bin/phpstan analyse ../CMS/core --level=5 --no-progress
        continue-on-error: true

      - name: Run PHPUnit (Unit Suite)
        working-directory: TEST
        run: vendor/bin/phpunit --testsuite Unit --testdox --colors=always

      - name: Run PHPUnit (Integration Suite)
        working-directory: TEST
        run: vendor/bin/phpunit --testsuite Integration --testdox --colors=always
        continue-on-error: true

      - name: Upload coverage report
        if: matrix.php == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: TEST/coverage/html
          if-no-files-found: ignore

  lint:
    name: Code Style (PHPCS PSR-12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        working-directory: TEST
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Run PHPCS
        working-directory: TEST
        run: vendor/bin/phpcs --standard=PSR12 --report=checkstyle ../CMS/core ../CMS/admin ../CMS/member ../CMS/includes 2>&1 | tee phpcs-report.xml || true
