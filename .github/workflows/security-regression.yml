name: Security Regression

on:
  push:
    paths:
      - 'CMS/**/*.php'
      - 'tests/**/*.php'
      - '.github/workflows/security-regression.yml'
  pull_request:
    paths:
      - 'CMS/**/*.php'
      - 'tests/**/*.php'
      - '.github/workflows/security-regression.yml'

jobs:
  security-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: PHP 8.4 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Security-Regressionssuite ausführen
        run: php tests/security/run.php

      - name: Vendor-/Drittpfad-Netzwerkmonitor ausführen
        run: php tests/vendor-network-monitoring/run.php

      - name: HTTP-Cache-/Proxy-Regressionssuite ausführen
        run: php tests/http-cache/run.php

      - name: Runtime-/Query-Telemetrie-Regressionssuite ausführen
        run: php tests/runtime-telemetry/run.php

      - name: Release-Smoke-Disziplin prüfen
        run: php tests/release-smoke/run.php

      - name: Architektur-Fitness-Checks ausführen
        run: php tests/architecture/run.php

      - name: Contract-/Interface-Checks ausführen
        run: php tests/contracts/run.php

      - name: Media-Settings-Regressionssuite ausführen
        run: php tests/media-settings/run.php

      - name: Media-Delivery-Regressionssuite ausführen
        run: php tests/media-delivery/run.php

      - name: Rollen-/Capability-Regressionssuite ausführen
        run: php tests/roles-capabilities/run.php

      - name: Router-Fallback-Regressionssuite ausführen
        run: php tests/router-fallbacks/run.php

      - name: Admin-View-Guard-Regressionssuite ausführen
        run: php tests/admin-view-guards/run.php

      - name: Kommentar-Status-Regressionssuite ausführen
        run: php tests/comment-status/run.php

      - name: DocumentationModule-Architekturcheck ausführen
        run: php tests/documentation-module/run.php

      - name: DocumentationSyncService-Architekturcheck ausführen
        run: php tests/documentation-sync-service/run.php

      - name: SiteTableService-Architekturcheck ausführen
        run: php tests/site-table-service/run.php

      - name: SeoMetaService-Architekturcheck ausführen
        run: php tests/seo-meta-service/run.php

      - name: LandingSectionService-Architekturcheck ausführen
        run: php tests/landing-section-service/run.php

      - name: EditorJsMediaService-Architekturcheck ausführen
        run: php tests/editorjs-media-service/run.php

      - name: media-proxy-Regressionssuite ausführen
        run: php tests/media-proxy/run.php
